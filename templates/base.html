<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Space Data API{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Sora:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <!-- Star field background -->
  <div class="starfield" id="starfield"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <a href="/" class="nav-logo">
      <span class="logo-icon">⬡</span>
      <span>ORBIT<span class="accent">LY</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">Home</a></li>
      <li><a href="/apod-page" class="nav-link {% if request.path == '/apod-page' %}active{% endif %}">APOD</a></li>
      <li><a href="/mars-page" class="nav-link {% if request.path == '/mars-page' %}active{% endif %}">Mars</a></li>
      <li><a href="/iss-page" class="nav-link {% if request.path == '/iss-page' %}active{% endif %}">ISS Tracker</a></li>
    </ul>
  </nav>

  <!-- Page content -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="footer">
    <p>Built with Flask &amp; NASA APIs &nbsp;·&nbsp; Data refreshes live &nbsp;·&nbsp; <span class="accent">Space Data API</span></p>
  </footer> 

  <script src="{{ url_for('static', filename='js/stars.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
